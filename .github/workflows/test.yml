name: Test

on:
  pull_request:
    branches:
      - main
      - next
      - next-major
      - beta
      - alpha

jobs:
  test:
    name: Test on Node.js ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Configure npm for GitHub Packages
        run: |
          echo "@wyre-technology:registry=https://npm.pkg.github.com" >> .npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> .npmrc

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Lint destructive tool warnings
        run: node scripts/lint-destructive-warnings.mjs src

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Test Docker build
        run: docker build --build-arg NODE_AUTH_TOKEN=${{ secrets.GITHUB_TOKEN }} -t saas-alerts-mcp:test .

  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: '18.x'
          cache: 'npm'

      - name: Configure npm for GitHub Packages
        run: |
          echo "@wyre-technology:registry=https://npm.pkg.github.com" >> .npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> .npmrc

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Lint destructive tool warnings
        run: node scripts/lint-destructive-warnings.mjs src

      - name: Build
        run: npm run build

      - name: Run tests with coverage
        run: npm run test:coverage
